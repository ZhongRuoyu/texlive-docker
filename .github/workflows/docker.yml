name: Build and publish Docker images

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 1 * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_USERNAME: zhongruoyu
  DOCKERHUB_REPOSITORY: zhongruoyu/texlive
  GHCR_USERNAME: zhongruoyu
  GHCR_REPOSITORY: ghcr.io/zhongruoyu/texlive

jobs:
  metadata:
    name: Determine metadata
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.date.outputs.date }}
      base-labels: ${{ steps.metadata-base.outputs.labels }}
      base-tags: ${{ steps.metadata-base.outputs.tags }}
      full-labels: ${{ steps.metadata-full.outputs.labels }}
      full-tags: ${{ steps.metadata-full.outputs.tags }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Determine date
        id: date
        run: |
          if [[ "$GITHUB_EVENT_NAME" = "schedule" ]]; then
            date="$(TZ=UTC date "+%Y%m%d")"
          else
            timestamp="$(git show --no-patch --format=%at)"
            date="$(TZ=UTC date --date="@$timestamp" "+%Y%m%dT%H%M%SZ")"
          fi
          echo "date=$date" >>"$GITHUB_OUTPUT"
      - name: Determine metadata for base image
        id: metadata-base
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.DOCKERHUB_REPOSITORY }}
            ${{ env.GHCR_REPOSITORY }}
          flavor: |
            latest=true
          tags: |
            base
            base-${{ steps.date.outputs.date }}
      - name: Determine metadata for full image
        id: metadata-full
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.DOCKERHUB_REPOSITORY }}
            ${{ env.GHCR_REPOSITORY }}
          flavor: |
            latest=false
          tags: |
            full
            full-${{ steps.date.outputs.date }}

  build:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        tag:
          - base
          - full
        arch:
          - x86_64
          - aarch64
    name: Build ${{ matrix.tag }} (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to Docker Hub
        if: github.ref_name == 'main'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        if: github.ref_name == 'main'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ github.token }}
      - name: Set up build
        id: setup
        run: |
          {
            if [[ "$PUSH" = true ]]; then
              echo "outputs<<OUTPUTS"
              echo "type=image,name=$DOCKERHUB_REPOSITORY,name-canonical=true,push=true,push-by-digest=true"
              echo "type=image,name=$GHCR_REPOSITORY,name-canonical=true,push=true,push-by-digest=true"
              echo "OUTPUTS"
            else
              echo "outputs="
            fi
          } >> "$GITHUB_OUTPUT"
        env:
          PUSH: ${{ github.ref_name == 'main' }}
          TAG: ${{ matrix.tag }}
      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: Dockerfile.${{ matrix.tag }}
          platforms: linux/${{ matrix.arch }}
          labels: ${{ needs.metadata.outputs[format('{0}-labels', matrix.tag)] }}
          outputs: ${{ steps.setup.outputs.outputs }}
      - name: Export digest
        run: |
          mkdir -p "$RUNNER_TEMP"/digests
          echo "${DIGEST#sha256:}" >"$RUNNER_TEMP"/digests/"$ARCH"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          ARCH: ${{ matrix.arch }}
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.tag }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*

  merge:
    if: github.ref_name == 'main'
    needs: [metadata, build]
    strategy:
      fail-fast: false
      matrix:
        tag:
          - base
          - full
    name: Merge ${{ matrix.tag }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ github.token }}
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.tag }}-*
          merge-multiple: true
      - name: Create manifest list and push
        run: |
          mapfile -t tags <<< "$TAGS"
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(--tag="$tag")
          done
          images=(
            "$GHCR_REPOSITORY@sha256:$(cat "$RUNNER_TEMP"/digests/x86_64)"
            "$GHCR_REPOSITORY@sha256:$(cat "$RUNNER_TEMP"/digests/aarch64)"
          )
          docker buildx imagetools create "${tag_args[@]}" "${images[@]}"
        env:
          TAGS: ${{ needs.metadata.outputs[format('{0}-tags', matrix.tag)] }}
